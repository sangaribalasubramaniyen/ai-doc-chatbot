 <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Q&A Chatbot</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #232526 0%, #414345 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        background: #1e293b;
        width: 100%;
        max-width: 560px;
        padding: 28px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      }
      h1 {
        font-size: 1.5rem;
        color: #ffffff;
        text-align: center;
        margin-bottom: 6px;
      }
      .subtitle {
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 22px;
      }
      input {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        background: #0f172a;
        color: #f1f5f9;
        border: 2px solid #334155;
        border-radius: 10px;
        outline: none;
      }
      input::placeholder { color: #94a3b8; }
      input:focus { border-color: #667eea; }
      button {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        font-size: 1rem;
        font-weight: 600;
        background: #667eea;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #5568d3; }
      button:disabled { background: #aaa; cursor: not-allowed; }
      #answer {
        margin-top: 20px;
        padding: 16px;
        background: #0f172a;
        border-left: 4px solid #667eea;
        border-radius: 8px;
        color: #e2e8f0;
        line-height: 1.6;
        white-space: pre-wrap;
        min-height: 24px;
        display: none;
      }
      /* Mobile screens */
      @media (max-width: 480px) {
        .card { padding: 20px; }
        h1 { font-size: 1.25rem; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📄 AI Document Q&A Chatbot</h1>
      <p class="subtitle">Ask anything about the document</p>
      <input id="query" type="text" placeholder="e.g. What skills does the person have?" />
      <button id="askBtn" onclick="ask()">Ask</button>
      <div id="answer"></div>
    </div>

    <script>
      const input = document.getElementById("query");
      const btn = document.getElementById("askBtn");
      const answerDiv = document.getElementById("answer");

      // Press Enter to ask
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });

      async function ask() {
        const query = input.value.trim();
        if (!query) return;
        answerDiv.style.display = "block";
        answerDiv.innerText = "Thinking...";
        btn.disabled = true;
        btn.innerText = "Thinking...";
        try {
          const res = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query })
          });
          const data = await res.json();
          answerDiv.innerText = data.answer;
        } catch (err) {
          answerDiv.innerText = "Error: could not reach the server. Is uvicorn running?";
        } finally {
          btn.disabled = false;
          btn.innerText = "Ask";
        }
      }
    </script>
  </body>
  </html>
